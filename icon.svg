<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <rect width="512" height="512" fill="#050814" rx="115"/>
    
    <defs>
        <pattern id="cyberGrid" width="32" height="32" patternUnits="userSpaceOnUse">
            <circle cx="16" cy="16" r="1.5" fill="#3B82F6" opacity="0.15"/>
        </pattern>
        
        <linearGradient id="gradIn" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#10B981"/>
            <stop offset="100%" stop-color="#00F2FF"/>
        </linearGradient>

        <linearGradient id="gradOut" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#8B5CF6"/>
            <stop offset="100%" stop-color="#F43F5E"/>
        </linearGradient>

        <linearGradient id="gradCore" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3B82F6"/>
            <stop offset="100%" stop-color="#00F2FF"/>
        </linearGradient>

        <filter id="neonGlow">
            <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <rect width="512" height="512" fill="url(#cyberGrid)" rx="115"/>

    <circle cx="256" cy="256" r="120" fill="none" stroke="#1E293B" stroke-width="2" stroke-dasharray="4 8"/>
    <circle cx="256" cy="256" r="145" fill="none" stroke="#1E293B" stroke-width="1" stroke-dasharray="2 4"/>

    <g stroke="#3B82F6" stroke-width="4" opacity="0.4" stroke-linecap="round" fill="none">
        <path d="M 100 130 L 100 100 L 130 100"/>
        <path d="M 412 130 L 412 100 L 382 100"/>
        <path d="M 100 382 L 100 412 L 130 412"/>
        <path d="M 412 382 L 412 412 L 382 412"/>
    </g>

    <g filter="url(#neonGlow)">
        <path d="M 80 232 L 100.8 244 L 100.8 268 L 80 280 L 59.2 268 L 59.2 244 Z" fill="url(#gradIn)"/>
        <path d="M 110 256 L 180 256" stroke="url(#gradIn)" stroke-width="6" stroke-dasharray="8 6" stroke-linecap="round"/>
        <path d="M 160 242 L 180 256 L 160 270" fill="none" stroke="url(#gradIn)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g filter="url(#neonGlow)">
        <path d="M 332 256 L 402 256" stroke="url(#gradOut)" stroke-width="6" stroke-dasharray="8 6" stroke-linecap="round"/>
        <path d="M 382 242 L 402 256 L 382 270" fill="none" stroke="url(#gradOut)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M 432 232 L 452.8 244 L 452.8 268 L 432 280 L 411.2 268 L 411.2 244 Z" fill="url(#gradOut)"/>
    </g>

    <g filter="url(#neonGlow)" opacity="0.7">
        <path d="M 256 64 L 269.8 72 L 269.8 88 L 256 96 L 242.2 88 L 242.2 72 Z" fill="#00F2FF"/>
        <path d="M 256 105 L 256 170" stroke="#00F2FF" stroke-width="4" stroke-dasharray="6 4" stroke-linecap="round"/>
        <path d="M 244 154 L 256 170 L 268 154" fill="none" stroke="#00F2FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        
        <path d="M 256 342 L 256 405" stroke="#3B82F6" stroke-width="4" stroke-dasharray="6 4" stroke-linecap="round"/>
        <path d="M 244 389 L 256 405 L 268 389" fill="none" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M 256 416 L 269.8 424 L 269.8 440 L 256 448 L 242.2 440 L 242.2 424 Z" fill="#3B82F6"/>
    </g>

    <path d="M 256 181 L 321 218.5 L 321 293.5 L 256 331 L 191 293.5 L 191 218.5 Z" fill="#0A1224" stroke="#3B82F6" stroke-width="5"/>
    
    <path d="M 256 211 L 295 233.5 L 295 278.5 L 256 301 L 217 278.5 L 217 233.5 Z" fill="url(#gradCore)" opacity="0.15" filter="url(#neonGlow)"/>
    <path d="M 256 211 L 295 233.5 L 295 278.5 L 256 301 L 217 278.5 L 217 233.5 Z" fill="none" stroke="url(#gradCore)" stroke-width="5"/>
    
    <circle cx="256" cy="256" r="14" fill="#FFFFFF" filter="url(#neonGlow)"/>
</svg>
