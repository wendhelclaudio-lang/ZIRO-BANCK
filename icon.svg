<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <rect width="512" height="512" fill="#0A0F1E" rx="115"/>
    
    <defs>
        <linearGradient id="gradEntrada" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00F2FF"/>
            <stop offset="100%" stop-color="#10B981"/>
        </linearGradient>
        
        <linearGradient id="gradSaida" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.15"/>
        </linearGradient>

        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="35" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <circle cx="256" cy="256" r="100" fill="url(#gradEntrada)" opacity="0.15" filter="url(#glow)"/>

    <path d="M 230 380 L 126 256 L 230 132 M 166 132 L 230 132 L 230 196" 
          fill="none" stroke="url(#gradEntrada)" stroke-width="32" 
          stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M 282 132 L 386 256 L 282 380 M 346 380 L 282 380 L 282 316" 
          fill="none" stroke="url(#gradSaida)" stroke-width="32" 
          stroke-linecap="round" stroke-linejoin="round"/>
