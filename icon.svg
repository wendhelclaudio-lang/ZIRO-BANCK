<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <rect width="512" height="512" fill="#060A14" rx="120"/>
    
    <defs>
        <linearGradient id="gradAscent" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00F2FF"/>
            <stop offset="50%" stop-color="#0EA5E9"/>
            <stop offset="100%" stop-color="#10B981"/>
        </linearGradient>

        <linearGradient id="gradBase" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1E293B"/>
            <stop offset="100%" stop-color="#0F172A"/>
        </linearGradient>

        <filter id="successGlow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="25" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <rect x="56" y="56" width="400" height="400" rx="90" fill="url(#gradBase)" stroke="#1E293B" stroke-width="4"/>
    
    <circle cx="360" cy="150" r="100" fill="url(#gradAscent)" opacity="0.2" filter="url(#successGlow)"/>

    <g transform="translate(18, 18)">
        <path d="M 120 380 L 190 380 L 190 330 L 120 330 Z" fill="url(#gradAscent)" opacity="0.4" rx="10"/>
        
        <path d="M 205 380 L 275 380 L 275 240 L 205 240 Z" fill="url(#gradAscent)" opacity="0.7"/>

        <path d="M 290 380 L 360 380 L 360 120 L 290 190 Z" fill="url(#gradAscent)" filter="url(#successGlow)"/>
        <path d="M 290 380 L 360 380 L 360 120 L 290 190 Z" fill="#ffffff" opacity="0.1"/>
        
        <path d="M 375 140 L 415 100" stroke="url(#gradAscent)" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
        <path d="M 385 180 L 415 150" stroke="url(#gradAscent)" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
    </g>

    <circle cx="256" cy="256" r="180" fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1" stroke-dasharray="4 12"/>
</svg>
