<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <rect width="512" height="512" fill="#03050A" rx="115"/>
    
    <defs>
        <radialGradient id="bgLight" cx="50%" cy="50%" r="60%" fx="80%" fy="20%">
            <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.25"/>
            <stop offset="40%" stop-color="#10B981" stop-opacity="0.05"/>
            <stop offset="100%" stop-color="#03050A" stop-opacity="1"/>
        </radialGradient>

        <radialGradient id="gridFade" cx="50%" cy="50%" r="50%">
            <stop offset="40%" stop-color="#ffffff" stop-opacity="1"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </radialGradient>
        <mask id="gridMask">
            <rect width="512" height="512" fill="url(#gridFade)"/>
        </mask>

        <linearGradient id="titanium" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#334155"/>
            <stop offset="50%" stop-color="#0F172A"/>
            <stop offset="100%" stop-color="#475569"/>
        </linearGradient>

        <linearGradient id="trendGrad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0284C7" stop-opacity="0"/>
            <stop offset="50%" stop-color="#00F2FF" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
        </linearGradient>

        <linearGradient id="step1" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0284C7"/>
            <stop offset="100%" stop-color="#00F2FF"/>
        </linearGradient>
        <linearGradient id="step2" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00F2FF"/>
            <stop offset="100%" stop-color="#10B981"/>
        </linearGradient>
        <linearGradient id="step3" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#10B981"/>
            <stop offset="100%" stop-color="#6EE7B7"/>
        </linearGradient>

        <filter id="superGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="8" result="blur1"/>
            <feGaussianBlur stdDeviation="20" result="blur2"/>
            <feMerge>
                <feMergeNode in="blur2"/>
                <feMergeNode in="blur1"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <filter id="dropShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000000" flood-opacity="0.9"/>
            <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#03050A" flood-opacity="0.5"/>
        </filter>
    </defs>

    <rect width="512" height="512" fill="url(#bgLight)" rx="115"/>

    <g mask="url(#gridMask)">
        <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="2">
            <line x1="0" y1="128" x2="512" y2="128"/>
            <line x1="0" y1="256" x2="512" y2="256"/>
            <line x1="0" y1="384" x2="512" y2="384"/>
            <line x1="128" y1="0" x2="128" y2="512"/>
            <line x1="256" y1="0" x2="256" y2="512"/>
            <line x1="384" y1="0" x2="384" y2="512"/>
        </g>
        <g fill="#00F2FF" opacity="0.4">
            <circle cx="128" cy="128" r="3"/> <circle cx="256" cy="128" r="3"/> <circle cx="384" cy="128" r="3"/>
            <circle cx="128" cy="256" r="3"/> <circle cx="256" cy="256" r="3"/> <circle cx="384" cy="256" r="3"/>
            <circle cx="128" cy="384" r="3"/> <circle cx="256" cy="384" r="3"/> <circle cx="384" cy="384" r="3"/>
        </g>
    </g>

    <path d="M 50 400 Q 150 400, 256 256 T 450 90" fill="none" stroke="url(#trendGrad)" stroke-width="3" stroke-dasharray="4 8" stroke-linecap="round"/>

    <rect x="64" y="64" width="384" height="384" rx="75" fill="none" stroke="url(#titanium)" stroke-width="8"/>
    <rect x="64" y="64" width="384" height="384" rx="75" fill="none" stroke="#00F2FF" stroke-width="2" stroke-opacity="0.5" stroke-dasharray="10 30" stroke-dashoffset="15"/>

    <g transform="translate(10, 10)" filter="url(#dropShadow)">
        
        <path d="M 120 370 L 190 370 L 190 290 L 120 290 Z" fill="url(#step1)" opacity="0.85"/>
        <path d="M 122 292 L 188 292" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 122 294 L 122 368" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="2" stroke-linecap="round"/>
        <circle cx="155" cy="265" r="4" fill="#00F2FF" filter="url(#superGlow)" opacity="0.8"/>

        <path d="M 210 370 L 280 370 L 280 200 L 210 200 Z" fill="url(#step2)" opacity="0.95"/>
        <path d="M 212 202 L 278 202" stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 212 204 L 212 368" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="2" stroke-linecap="round"/>
        <circle cx="230" cy="170" r="5" fill="#10B981" filter="url(#superGlow)" opacity="0.9"/>
        <circle cx="260" cy="185" r="3" fill="#00F2FF" filter="url(#superGlow)" opacity="0.6"/>

        <path d="M 300 370 L 370 370 L 370 120 L 300 190 Z" fill="url(#step3)" filter="url(#superGlow)" opacity="0.9"/>
        <path d="M 300 370 L 370 370 L 370 120 L 300 190 Z" fill="url(#step3)"/>
        <path d="M 303 192 L 367 128" stroke="#FFFFFF" stroke-opacity="1" stroke-width="3" stroke-linecap="round"/>
        <path d="M 302 195 L 302 368" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="2" stroke-linecap="round"/>
        
    </g>

    <g transform="translate(380, 130)">
        <circle cx="0" cy="0" r="24" fill="#10B981" opacity="0.25" filter="url(#superGlow)"/>
        <circle cx="0" cy="0" r="12" fill="#00F2FF" opacity="0.4" filter="url(#superGlow)"/>
        <g filter="url(#superGlow)">
            <path d="M 0 -30 L 3 -7 L 30 0 L 3 7 L 0 30 L -3 7 L -30 0 L -3 -7 Z" fill="#FFFFFF"/>
            <circle cx="0" cy="0" r="4" fill="#FFFFFF"/>
        </g>
    </g>
</svg>
