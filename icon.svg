<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <rect width="512" height="512" fill="#060A14" rx="115"/>
    
    <defs>
        <radialGradient id="bgLight" cx="50%" cy="50%" r="50%" fx="80%" fy="20%">
            <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#060A14" stop-opacity="1"/>
        </radialGradient>

        <linearGradient id="trendGrad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0284C7" stop-opacity="0"/>
            <stop offset="50%" stop-color="#00F2FF" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
        </linearGradient>

        <linearGradient id="step1" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0284C7"/>
            <stop offset="100%" stop-color="#00F2FF"/>
        </linearGradient>
        
        <linearGradient id="step2" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00F2FF"/>
            <stop offset="100%" stop-color="#10B981"/>
        </linearGradient>
        
        <linearGradient id="step3" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#10B981"/>
            <stop offset="100%" stop-color="#34D399"/>
        </linearGradient>

        <filter id="superGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="12" result="blur1"/>
            <feGaussianBlur stdDeviation="24" result="blur2"/>
            <feMerge>
                <feMergeNode in="blur2"/>
                <feMergeNode in="blur1"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <filter id="dropShadow" x="-20%" y="-20%" width="150%" height="150%">
            <feDropShadow dx="4" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.85"/>
        </filter>
    </defs>

    <rect width="512" height="512" fill="url(#bgLight)" rx="115"/>

    <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="2">
        <line x1="0" y1="128" x2="512" y2="128"/>
        <line x1="0" y1="256" x2="512" y2="256"/>
        <line x1="0" y1="384" x2="512" y2="384"/>
        <line x1="128" y1="0" x2="128" y2="512"/>
        <line x1="256" y1="0" x2="256" y2="512"/>
        <line x1="384" y1="0" x2="384" y2="512"/>
    </g>
    
    <g fill="#00F2FF" opacity="0.3">
        <circle cx="128" cy="128" r="2.5"/> <circle cx="256" cy="128" r="2.5"/> <circle cx="384" cy="128" r="2.5"/>
        <circle cx="128" cy="256" r="2.5"/> <circle cx="256" cy="256" r="2.5"/> <circle cx="384" cy="256" r="2.5"/>
        <circle cx="128" cy="384" r="2.5"/> <circle cx="256" cy="384" r="2.5"/> <circle cx="384" cy="384" r="2.5"/>
    </g>

    <path d="M 60 380 Q 180 380, 250 250 T 420 100" fill="none" stroke="url(#trendGrad)" stroke-width="4" stroke-dasharray="6 8" stroke-linecap="round"/>

    <rect x="64" y="64" width="384" height="384" rx="75" fill="none" stroke="#1E293B" stroke-width="6"/>
    <rect x="64" y="64" width="384" height="384" rx="75" fill="none" stroke="#00F2FF" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="15 30" stroke-dashoffset="10"/>

    <g transform="translate(10, 10)" filter="url(#dropShadow)">
        
        <path d="M 120 370 L 190 370 L 190 290 L 120 290 Z" fill="url(#step1)" opacity="0.8"/>
        <path d="M 122 292 L 188 292" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 122 294 L 122 368" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="2" stroke-linecap="round"/> <path d="M 210 370 L 280 370 L 280 200 L 210 200 Z" fill="url(#step2)" opacity="0.9"/>
        <path d="M 212 202 L 278 202" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 212 204 L 212 368" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="2" stroke-linecap="round"/>

        <path d="M 300 370 L 370 370 L 370 120 L 300 190 Z" fill="url(#step3)" filter="url(#superGlow)" opacity="0.9"/>
        <path d="M 300 370 L 370 370 L 370 120 L 300 190 Z" fill="url(#step3)"/>
        <path d="M 303 192 L 367 128" stroke="#FFFFFF" stroke-opacity="0.95" stroke-width="3" stroke-linecap="round"/>
        <path d="M 302 195 L 302 368" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="2" stroke-linecap="round"/>
        
    </g>

    <g transform="translate(380, 130)">
        <circle cx="0" cy="0" r="16" fill="#00F2FF" opacity="0.2" filter="url(#superGlow)"/>
        <g filter="url(#superGlow)">
            <path d="M 0 -26 L 4 -6 L 26 0 L 4 6 L 0 26 L -4 6 L -26 0 L -4 -6 Z" fill="#FFFFFF"/>
            <circle cx="0" cy="0" r="5" fill="#00F2FF"/>
        </g>
    </g>
</svg>
