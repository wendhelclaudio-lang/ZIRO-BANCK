<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <rect width="512" height="512" fill="#03050A" rx="115"/>
    
    <defs>
        <linearGradient id="gradTop" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00F2FF"/>
            <stop offset="100%" stop-color="#1D4ED8"/>
        </linearGradient>

        <linearGradient id="gradLeft" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#10B981"/>
            <stop offset="100%" stop-color="#064E3B"/>
        </linearGradient>

        <linearGradient id="gradRight" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F43F5E"/>
            <stop offset="100%" stop-color="#4C0519"/>
        </linearGradient>

        <filter id="coreGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="25" result="blur1"/>
            <feGaussianBlur stdDeviation="10" result="blur2"/>
            <feMerge>
                <feMergeNode in="blur1"/>
                <feMergeNode in="blur2"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <filter id="neonEdge">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <path d="M 256 56 L 429 156 L 429 356 L 256 456 L 83 356 L 83 156 Z" fill="none" stroke="#1E293B" stroke-width="2" stroke-dasharray="10 15"/>
    <circle cx="256" cy="256" r="220" fill="none" stroke="#0F172A" stroke-width="1"/>

    <g transform="translate(0, -5)">
        <path d="M 256 60 L 396 140 L 256 220 L 116 140 Z" fill="url(#gradTop)" opacity="0.8"/>
        <path d="M 256 60 L 396 140 L 256 220 L 116 140 Z" fill="none" stroke="#00F2FF" stroke-width="2" filter="url(#neonEdge)"/>
        
        <path d="M 256 100 L 326 140 L 256 180 L 186 140 Z" fill="none" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="2"/>
        <circle cx="256" cy="140" r="4" fill="#00F2FF" filter="url(#neonEdge)"/>
    </g>

    <g transform="translate(-5, 5)">
        <path d="M 106 175 L 246 255 L 246 415 L 106 335 Z" fill="url(#gradLeft)" opacity="0.9"/>
        <path d="M 106 175 L 246 255 L 246 415 L 106 335 Z" fill="none" stroke="#10B981" stroke-width="2"/>
        
        <line x1="140" y1="205" x2="140" y2="335" stroke="#34D399" stroke-width="6" stroke-linecap="round" stroke-dasharray="15 12" opacity="0.8"/>
        <line x1="176" y1="225" x2="176" y2="365" stroke="#34D399" stroke-width="6" stroke-linecap="round" stroke-dasharray="25 15" opacity="0.8"/>
        <line x1="212" y1="245" x2="212" y2="395" stroke="#34D399" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 10" opacity="0.8"/>
    </g>

    <g transform="translate(5, 5)">
        <path d="M 406 175 L 266 255 L 266 415 L 406 335 Z" fill="url(#gradRight)" opacity="0.9"/>
        <path d="M 406 175 L 266 255 L 266 415 L 406 335 Z" fill="none" stroke="#F43F5E" stroke-width="2"/>
        
        <line x1="372" y1="205" x2="372" y2="335" stroke="#FB7185" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 10" opacity="0.8"/>
        <line x1="336" y1="225" x2="336" y2="365" stroke="#FB7185" stroke-width="6" stroke-linecap="round" stroke-dasharray="25 15" opacity="0.8"/>
        <line x1="300" y1="245" x2="300" y2="395" stroke="#FB7185" stroke-width="6" stroke-linecap="round" stroke-dasharray="15 12" opacity="0.8"/>
    </g>

    <g stroke="#FFFFFF" stroke-width="2" opacity="0.6" filter="url(#neonEdge)">
        <line x1="256" y1="245" x2="256" y2="215" />
        <line x1="256" y1="245" x2="241" y2="260" />
        <line x1="256" y1="245" x2="271" y2="260" />
    </g>

    <circle cx="256" cy="245" r="28" fill="#FFFFFF" filter="url(#coreGlow)"/>
    <circle cx="256" cy="245" r="14" fill="#00F2FF"/>
</svg>
