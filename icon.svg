<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <rect width="512" height="512" fill="#0A0F1E" rx="115"/>
    
    <defs>
        <linearGradient id="incFull" gradientUnits="userSpaceOnUse" x1="-175" y1="175" x2="50" y2="-175">
            <stop offset="0%" stop-color="#00F2FF"/>
            <stop offset="100%" stop-color="#10B981"/>
        </linearGradient>

        <linearGradient id="expFull" gradientUnits="userSpaceOnUse" x1="175" y1="-175" x2="-50" y2="175">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="50%" stop-color="#D1D5DB"/>
            <stop offset="100%" stop-color="#4B5563"/>
        </linearGradient>

        <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#10B981"/>
            <stop offset="100%" stop-color="#00F2FF"/>
        </linearGradient>

        <filter id="shadowBlur">
            <feGaussianBlur stdDeviation="10"/>
        </filter>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="40" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
    </defs>

    <g transform="translate(256,256)">
        <circle cx="0" cy="0" r="140" fill="url(#incFull)" opacity="0.25" filter="url(#glow)"/>
        
        <path d="M 0 175 L -175 0 L 0 -175 L 50 -125 L -75 0 L 50 125 Z" fill="url(#incFull)"/>

        <circle cx="-15" cy="165" r="30" fill="#000000" opacity="0.5" filter="url(#shadowBlur)"/>

        <path d="M 0 -175 L 175 0 L 0 175 L -50 125 L 75 0 L -50 -125 Z" fill="url(#expFull)"/>

        <circle cx="25" cy="-145" r="30" fill="#000000" opacity="0.6" filter="url(#shadowBlur)"/>

        <path d="M -174 1 L 0 -175 L 50 -125 L -74 1 Z" fill="url(#incFull)"/>

        <g opacity="0.9">
            <path d="M -12 8 L 0 -6 L 12 8" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" transform="translate(-125, 0) rotate(45)"/>
            <path d="M -12 8 L 0 -6 L 12 8" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" transform="translate(-50, -75) rotate(45)"/>
        </g>

        <g opacity="0.35">
            <path d="M -12 8 L 0 -6 L 12 8" fill="none" stroke="#0A0F1E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" transform="translate(125, 0) rotate(225)"/>
            <path d="M -12 8 L 0 -6 L 12 8" fill="none" stroke="#0A0F1E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" transform="translate(50, 75) rotate(225)"/>
        </g>

        <rect x="-34" y="-34" width="68" height="68" rx="16" fill="#ffffff" transform="rotate(45)"/>
        <rect x="-24" y="-24" width="48" height="48" rx="10" fill="url(#coreGrad)" transform="rotate(45)"/>
    </g>
</svg>
